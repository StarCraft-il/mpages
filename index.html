<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mPages-Mobile First</title>
    <script src="m1t2/content/lib/jquery/3.5.1/jquery.js"></script>
    <style>
        :root {
            --bg: #08111f;
            --surface: #121c2d;
            --surface-2: #18263d;
            --line: rgba(255, 255, 255, 0.08);
            --text: #edf4ff;
            --muted: #9eb0ca;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #09111f 0%, #0d1728 55%, #09101b 100%);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .page {
            width: min(100%, 920px);
            margin: 0 auto;
            padding: 18px 14px 28px;
        }

        .hero {
            padding: 18px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.12), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(56, 189, 248, 0.18);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 28px;
            line-height: 1.2;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .dt-line {
            margin-top: 12px;
            color: #d8f4ff;
            font-size: 14px;
            line-height: 1.6;
        }

        #dtDisplay {
            font-weight: 700;
        }

        .section {
            margin-top: 16px;
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
        }

        .section h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .buttons {
            display: grid;
            gap: 12px;
        }

        .button-link {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 16px 16px 14px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(24, 38, 61, 0.96), rgba(18, 28, 45, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .button-link.primary {
            border-color: rgba(56, 189, 248, 0.34);
            background: linear-gradient(180deg, rgba(18, 45, 67, 0.96), rgba(15, 32, 50, 0.96));
        }

        .button-title {
            display: block;
            font-size: 19px;
            font-weight: bold;
            line-height: 1.35;
        }

        .button-subtitle {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        @media (min-width: 760px) {
            .page {
                padding: 26px 20px 40px;
            }

            .buttons {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .hero h1 {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <h1>mPages</h1>
            <p>Mobile-first test launcher.</p>
            <div class="dt-line">Current time: <span id="dtDisplay"></span></div>
        </section>

        <section class="section">
            <h2>Test Pages</h2>
            <div class="buttons">
                <a id="linkTestPages" class="button-link primary" href="./test_pages.html">
                    <span class="button-title">Tests</span>
                    <span class="button-subtitle">Opens with a fresh timestamp query string.</span>
                </a>
            </div>
        </section>
    </main>

    <script>
        $(function () {
            const reloadEverySeconds = 15;
            const $dtDisplay = $("#dtDisplay");
            const $linkTestPages = $("#linkTestPages");
            const baseLinkTestPagesHref = "./test_pages.html";

            function formatDateTime(now) {
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, "0");
                const day = String(now.getDate()).padStart(2, "0");
                const hours = String(now.getHours()).padStart(2, "0");
                const minutes = String(now.getMinutes()).padStart(2, "0");
                const seconds = String(now.getSeconds()).padStart(2, "0");
                return year + "-" + month + "-" + day + " " + hours + ":" + minutes + ":" + seconds;
            }

            function updateDateTimeAndLinks() {
                const now = new Date();
                const timestamp = now.getTime();
                const formattedDateTime = formatDateTime(now);
                const freshHref = baseLinkTestPagesHref + "?v=" + timestamp;

                $dtDisplay.text(formattedDateTime);
                $linkTestPages.attr("href", freshHref);
            }

            updateDateTimeAndLinks();
            window.setInterval(updateDateTimeAndLinks, 1000);

            window.setTimeout(function () {
                window.location.reload();
            }, reloadEverySeconds * 1000);
        });
    </script>
</body>
</html>
