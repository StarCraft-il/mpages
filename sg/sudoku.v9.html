<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048: Kinetic Edition</title>
    <style>
        :root {
            --bg-color: #bbada0;
            --tile-bg: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background-color: #faf8ef;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            width: 90vw;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .score-container {
            background: var(--bg-color);
            padding: 5px 15px;
            border-radius: 3px;
            color: white;
            text-align: center;
        }

        #grid-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            background: var(--bg-color);
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
        }

        .grid-cell {
            width: 21.5%;
            height: 21.5%;
            margin: 1.75%;
            background: var(--tile-bg);
            border-radius: 3px;
            float: left;
        }

        .tile {
            position: absolute;
            width: 21.5%;
            height: 21.5%;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            transition-property: top, left;
            z-index: 10;
        }

        /* Tile Colors */
        .tile-2 { background: #eee4da; color: var(--text-dark); }
        .tile-4 { background: #ede0c8; color: var(--text-dark); }
        .tile-8 { background: #f2b179; color: var(--text-light); }
        .tile-16 { background: #f59563; color: var(--text-light); }
        .tile-32 { background: #f67c5f; color: var(--text-light); }
        .tile-64 { background: #f65e3b; color: var(--text-light); }
        .tile-128 { background: #edcf72; color: var(--text-light); font-size: 20px; }
        .tile-256 { background: #edcc61; color: var(--text-light); font-size: 20px; }
        .tile-512 { background: #edc850; color: var(--text-light); font-size: 20px; }
        .tile-1024 { background: #edc53f; color: var(--text-light); font-size: 16px; }
        .tile-2048 { background: #edc22e; color: var(--text-light); font-size: 16px; }

        .btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0">2048</h1>
        <div class="score-container">
            <div style="font-size: 10px; text-transform: uppercase;">Score</div>
            <div id="score" style="font-size: 20px; font-weight: bold;">0</div>
        </div>
    </div>

    <div id="grid-container">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>

    <button class="btn" onclick="resetGame()">New Game</button>

    <script>
        const container = document.getElementById('grid-container');
        const scoreEl = document.getElementById('score');
        let grid = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0;

        // Random Styles Arrays
        const easings = ['ease-in-out', 'cubic-bezier(0.175, 0.885, 0.32, 1.275)', 'ease-in', 'linear', 'cubic-bezier(0.6, -0.28, 0.735, 0.045)'];

        function init() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            updateScore();
            addTile();
            addTile();
            render();
        }

        function addTile() {
            let empty = [];
            for(let r=0; r<4; r++) 
                for(let c=0; c<4; c++) 
                    if(grid[r][c] === 0) empty.push({r, c});
            
            if(empty.length > 0) {
                let {r, c} = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            // Clear existing tiles
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(t => t.remove());

            // Randomize move feel
            const randomDuration = (Math.random() * 0.2 + 0.1).toFixed(2); // 0.1s to 0.3s
            const randomEasing = easings[Math.floor(Math.random() * easings.length)];

            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    if(grid[r][c] !== 0) {
                        let div = document.createElement('div');
                        div.className = `tile tile-${grid[r][c]}`;
                        div.innerHTML = grid[r][c];
                        // Calculate position
                        div.style.left = (c * 25 + 1.75) + '%';
                        div.style.top = (r * 25 + 1.75) + '%';
                        div.style.transitionDuration = `${randomDuration}s`;
                        div.style.transitionTimingFunction = randomEasing;
                        container.appendChild(div);
                    }
                }
            }
        }

        function move(dir) {
            let moved = false;
            let rotatedGrid = grid;

            // Simple logic: rotate grid to always move "Left"
            if(dir === 'right') rotatedGrid = rotate(rotate(grid));
            if(dir === 'up') rotatedGrid = rotate(rotate(rotate(grid)));
            if(dir === 'down') rotatedGrid = rotate(grid);

            for(let r=0; r<4; r++) {
                let row = rotatedGrid[r].filter(v => v !== 0);
                for(let i=0; i<row.length-1; i++) {
                    if(row[i] === row[i+1]) {
                        row[i] *= 2;
                        score += row[i];
                        row.splice(i+1, 1);
                        moved = true;
                    }
                }
                while(row.length < 4) row.push(0);
                if(JSON.stringify(rotatedGrid[r]) !== JSON.stringify(row)) moved = true;
                rotatedGrid[r] = row;
            }

            // Rotate back
            if(dir === 'right') grid = rotate(rotate(rotatedGrid));
            else if(dir === 'up') grid = rotate(rotatedGrid);
            else if(dir === 'down') grid = rotate(rotate(rotate(rotatedGrid)));
            else grid = rotatedGrid;

            if(moved) {
                addTile();
                updateScore();
                render();
            }
        }

        function rotate(m) {
            return m[0].map((_, i) => m.map(row => row[i]).reverse());
        }

        function updateScore() {
            scoreEl.innerText = score;
        }

        function resetGame() {
            init();
        }

        // Touch handling
        let touchStartX, touchStartY;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - touchStartX;
            let dy = e.changedTouches[0].clientY - touchStartY;
            if(Math.abs(dx) > Math.abs(dy)) {
                if(Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
            } else {
                if(Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
            }
        });

        // Desktop Arrow Keys
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') move('up');
            if(e.key === 'ArrowDown') move('down');
            if(e.key === 'ArrowLeft') move('left');
            if(e.key === 'ArrowRight') move('right');
        });

        init();
    </script>
</body>
</html>
