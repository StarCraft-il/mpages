    <script>
        // Set up PDF.js Global Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Configuration States
        let currentPdf = null;
        let isScrolling = false;
        let scrollIntervalId = null;

        let scrollHeight = 400; // in pixels
        let scrollSpeed = 1;    // pixels moved per interval step
        let scrollDelay = 30;   // millisecond delay between interval steps

        // DOM elements
        const appContainer = document.getElementById('app-container');
        const fileSelector = document.getElementById('file-selector');
        const btnToggle = document.getElementById('btn-toggle');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const pdfViewport = document.getElementById('pdf-viewport');
        const pdfRenderContainer = document.getElementById('pdf-render-container');
        const placeholderText = document.getElementById('placeholder-text');
        const pdfBase64Data = document.getElementById('pdfBase64Data');

        // Dynamic State UI Printers
        function updateUIIndicators() {
            document.getElementById('val-height').innerText = typeof scrollHeight === 'number' ? `${scrollHeight}px` : scrollHeight;
            document.getElementById('val-speed').innerText = `${scrollSpeed}px`;
            document.getElementById('val-delay').innerText = `${scrollDelay}ms`;
            
            // Set styles dynamically
            pdfViewport.style.height = typeof scrollHeight === 'number' ? `${scrollHeight}px` : scrollHeight;
        }

        // Control Adjusters
        function adjustHeight(amount) {
            if (typeof scrollHeight !== 'number') scrollHeight = 400;
            scrollHeight = Math.max(150, Math.min(scrollHeight + amount, 1200));
            updateUIIndicators();
        }

        function setPresetHeight(preset) {
            scrollHeight = preset;
            updateUIIndicators();
        }

        function adjustSpeed(amount) {
            scrollSpeed = Math.max(1, Math.min(scrollSpeed + amount, 20));
            updateUIIndicators();
            restartScrollLoopIfNeeded();
        }

        function adjustDelay(amount) {
            scrollDelay = Math.max(5, Math.min(scrollDelay + amount, 500));
            updateUIIndicators();
            restartScrollLoopIfNeeded();
        }

        // Auto Scroll Controller
        function startScrolling() {
            if (scrollIntervalId) clearInterval(scrollIntervalId);
            isScrolling = true;
            btnToggle.innerText = "Pause";
            btnToggle.classList.replace('bg-emerald-600', 'bg-amber-600');
            btnToggle.classList.replace('active:bg-emerald-700', 'active:bg-amber-700');

            scrollIntervalId = setInterval(() => {
                const maxScroll = pdfViewport.scrollHeight - pdfViewport.clientHeight;
                if (pdfViewport.scrollTop >= maxScroll - 1) {
                    pdfViewport.scrollTop = 0;
                } else {
                    pdfViewport.scrollTop += scrollSpeed;
                }
            }, scrollDelay);
        }

        function stopScrolling() {
            isScrolling = false;
            if (scrollIntervalId) {
                clearInterval(scrollIntervalId);
                scrollIntervalId = null;
            }
            btnToggle.innerText = "Start";
            btnToggle.classList.replace('bg-amber-600', 'bg-emerald-600');
            btnToggle.classList.replace('active:bg-amber-700', 'active:bg-emerald-700');
        }

        function restartScrollLoopIfNeeded() {
            if (isScrolling) {
                startScrolling();
            }
        }

        // Action Toggles
        btnToggle.addEventListener('click', () => {
            if (!currentPdf) {
                alert("Please upload a PDF file first before trying to play.");
                return;
            }
            if (isScrolling) {
                stopScrolling();
            } else {
                startScrolling();
            }
        });

        // Native Fullscreen Toggle Logic
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                appContainer.requestFullscreen().catch(err => {
                    alert(`Error trying to enable fullscreen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Watch for fullscreen escape changes (e.g. system back buttons) to update UI text
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                btnFullscreen.innerText = "Exit Fullscreen";
                btnFullscreen.classList.replace('bg-indigo-600', 'bg-rose-600');
                btnFullscreen.classList.replace('active:bg-indigo-700', 'active:bg-rose-700');
                
                // Optional optimization: switch view height to fill layout space when opening fullscreen
                if (typeof scrollHeight === 'string' && scrollHeight.includes('vh')) {
                     updateUIIndicators();
                }
            } else {
                btnFullscreen.innerText = "Fullscreen";
                btnFullscreen.classList.replace('bg-rose-600', 'bg-indigo-600');
                btnFullscreen.classList.replace('active:bg-rose-700', 'active:bg-indigo-700');
            }
        });

        function getPdfBytesFromBase64(base64Text) {
            const binaryText = window.atob(base64Text);
            const pdfBytes = new Uint8Array(binaryText.length);
            for (let index = 0; index < binaryText.length; index++) {
                pdfBytes[index] = binaryText.charCodeAt(index);
            }

            return pdfBytes;
        }

        async function loadPdfBytes(pdfBytes, fileName) {
            stopScrolling();
            placeholderText.innerText = "Processing document pages. Please wait...";
            placeholderText.style.display = 'block';
            pdfRenderContainer.querySelectorAll('canvas').forEach(canvas => canvas.remove());

            try {
                currentPdf = await pdfjsLib.getDocument(pdfBytes).promise;
                placeholderText.style.display = 'none';
                
                for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                    await renderPdfPage(pageNum);
                }
                
                pdfViewport.scrollTop = 0;
            } catch (error) {
                console.error(error);
                alert("An error occurred while compiling the asset elements of this PDF.");
                placeholderText.innerText = "Error loading PDF.";
                placeholderText.style.display = 'block';
            }
        }

        function loadEmbeddedPdfIfAvailable() {
            const base64Text = pdfBase64Data ? pdfBase64Data.textContent.trim().replace(/\s/g, "") : "";
            if (!base64Text) {
                return;
            }

            const pdfFileName = pdfRenderContainer.getAttribute('data-pdf-file-name') || 'embedded PDF';
            const pdfBytes = getPdfBytesFromBase64(base64Text);
            loadPdfBytes(pdfBytes, pdfFileName);
        }

        // Async PDF Document Parsing and Pipeline Generation
        fileSelector.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || file.type !== 'application/pdf') {
                alert("Invalid format detected. Please submit a valid PDF document file structure.");
                return;
            }

            const fileReader = new FileReader();
            fileReader.onload = async function () {
                const typedarray = new Uint8Array(this.result);
                await loadPdfBytes(typedarray, file.name);
            };
            fileReader.readAsArrayBuffer(file);
        });

        // Page Renderer Logic Context
        async function renderPdfPage(pageNum) {
            const page = await currentPdf.getPage(pageNum);
            const viewportPrototype = page.getViewport({ scale: 1.0 });
            const customScale = (pdfViewport.clientWidth - 16) / viewportPrototype.width; 
            const viewport = page.getViewport({ scale: customScale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            pdfRenderContainer.appendChild(canvas);

            const renderContext = {
                canvasContext: context,
                viewport: viewport
            };
            await page.render(renderContext).promise;
        }

        // Initialize view metric states
        updateUIIndicators();
        loadEmbeddedPdfIfAvailable();
    </script>
