    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

            async function renderPdfInViewer() {
                if (pdfRenderStarted) {
                    return;
                }

                pdfRenderStarted = true;
                if (!pdfPages || !pdfSource) {
                    setStatus("PDF source is missing.");
                    showPdfFallback("PDF source is missing.");
                    return;
                }

                if (!configurePdfJsWorker()) {
                    showPdfFallback("PDF renderer was not loaded. Use the open link.");
                    return;
                }

                try {
                    setStatus("Rendering PDF file for mobile display.");
                    const pdfBytes = getPdfBytesFromBase64();
                    const loadingTask = window.pdfjsLib.getDocument({ data: pdfBytes });
                    const pdfDocument = await loadingTask.promise;
                    clearPdfPages();

                    }

                    pdfRenderCompleted = true;
                    if (pdfFallback) {

                    setStatus("PDF loaded in mobile display.");

                }

            function configurePdfJsWorker() {

                    return false;

                return true;

            function getPdfBytesFromBase64() {

                    throw new Error("PDF data is missing.");
                }

                const binaryText = window.atob(base64Text);
                const pdfBytes = new Uint8Array(binaryText.length);
                for (let index = 0; index < binaryText.length; index++) {
                    pdfBytes[index] = binaryText.charCodeAt(index);
                }

                return pdfBytes;
            }

            function clearPdfPages() {
                while (pdfPages.firstChild) {
                    pdfPages.removeChild(pdfPages.firstChild);
                }

                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";

                if (pixelRatio !== 1) {
                    renderContext.transform = [pixelRatio, 0, 0, pixelRatio, 0, 0];
                }

                pageShell.className = "pdf-page-shell";
                pageShell.appendChild(canvas);
                pdfPages.appendChild(pageShell);
                await page.render(renderContext).promise;
            }

            function showPdfFallback(message) {
                if (pdfLoadingMessage) {
                    pdfLoadingMessage.textContent = message;
                }

                if (pdfFallback) {
                    pdfFallback.hidden = false;
                }

                setStatus(message);
            }

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function normalizeNumber(value, min, max, fallbackValue) {
                const numericValue = Number(value);
                if (Number.isFinite(numericValue)) {
                    return clamp(numericValue, min, max);
                }

                return clamp(fallbackValue, min, max);
            }

            function setStatus(message) {
                if (!autoScrollStatus) {
                    return;
                }

                autoScrollStatus.textContent = message;
            }

            function getFullScreenElement() {
                return document.fullscreenElement ||
                    document.webkitFullscreenElement ||
                    null;
            }

            async function openFullScreen() {
                if (pdfDisplayShell.requestFullscreen) {
                    await pdfDisplayShell.requestFullscreen();
                    return;
                }

                if (pdfDisplayShell.webkitRequestFullscreen) {
                    await pdfDisplayShell.webkitRequestFullscreen();
                    return;
                }

                throw new Error("Fullscreen is not supported by this browser.");
            }

            async function closeFullScreen() {
                if (document.exitFullscreen) {
                    await document.exitFullscreen();
                    return;
                }

                if (document.webkitExitFullscreen) {
                    await document.webkitExitFullscreen();
                    return;
                }

                throw new Error("Exit fullscreen is not supported by this browser.");
            }

            async function requestFullScreen(messageWhenOpened) {
                if (!fullScreenEnabled || getFullScreenElement()) {
                    return;
                }

                try {
                    await openFullScreen();
                    fullScreenActivationPending = false;
                    if (messageWhenOpened) {
                        setStatus(messageWhenOpened);
                    }
                } catch (error) {
                    fullScreenActivationPending = true;
                    setStatus("Full screen will open after the next tap/click.");
                }
            }

            async function closeFullScreenIfNeeded() {
                fullScreenActivationPending = false;
                if (!getFullScreenElement()) {
                    return;
                }

                try {
                    await closeFullScreen();
                    setStatus("Full screen disabled.");
                } catch (error) {
                    setStatus("Could not exit full screen from this browser.");
                }
            }

            function requestPendingFullScreen(event) {
                if (!fullScreenEnabled || !fullScreenActivationPending || getFullScreenElement()) {
                    return;
                }

                if (event.target === pdfFullScreenCheckbox) {
                    return;
                }

                requestFullScreen("Full screen opened.");
            }

            function getScrollElement() {
                return pdfScrollContainer;
            }

            function getMaxScrollTop(scrollElement) {
                return Math.max(0, scrollElement.scrollHeight - scrollElement.clientHeight);
            }

            function getStepPixels() {
                return Math.max(1, Math.round(window.innerHeight * (stepScrollScreenHeightPercent / 100)));
            }

            function setPanelVisible(isVisible) {
                if (!autoScrollPanel || !autoScrollToggleButton) {
                    return;
                }

                autoScrollPanel.hidden = !isVisible;
                autoScrollToggleButton.setAttribute("aria-expanded", String(isVisible));
            }

            function updateUi() {
                if (autoScrollEnabledCheckbox) {
                    autoScrollEnabledCheckbox.checked = stepScrollEnabled;
                }

                if (pdfFullScreenCheckbox) {
                    pdfFullScreenCheckbox.checked = fullScreenEnabled;
                }

                if (autoScrollDirectionCheckbox) {
                    autoScrollDirectionCheckbox.checked = stepScrollDirectionDown;
                }

                if (autoScrollStepHeightRange) {
                    autoScrollStepHeightRange.min = String(stepScrollConfig.minScreenHeightPercent);
                    autoScrollStepHeightRange.max = String(stepScrollConfig.maxScreenHeightPercent);
                    autoScrollStepHeightRange.value = String(Math.round(stepScrollScreenHeightPercent));
                }

                if (autoScrollStepHeightValue) {
                    autoScrollStepHeightValue.textContent = Math.round(stepScrollScreenHeightPercent) + "%";
                }

                if (autoScrollWaitDelayRange) {
                    autoScrollWaitDelayRange.min = String(stepScrollConfig.minWaitDelayMs);
                    autoScrollWaitDelayRange.max = String(stepScrollConfig.maxWaitDelayMs);
                    autoScrollWaitDelayRange.value = String(Math.round(stepScrollWaitDelayMs));
                }

                if (autoScrollWaitDelayValue) {
                    autoScrollWaitDelayValue.textContent = Math.round(stepScrollWaitDelayMs) + " ms";
                }

                if (autoScrollAnimationDurationRange) {
                    autoScrollAnimationDurationRange.min = String(stepScrollConfig.minAnimationDurationMs);
                    autoScrollAnimationDurationRange.max = String(stepScrollConfig.maxAnimationDurationMs);
                    autoScrollAnimationDurationRange.value = String(Math.round(stepScrollAnimationDurationMs));
                }

                if (autoScrollAnimationDurationValue) {
                    autoScrollAnimationDurationValue.textContent = Math.round(stepScrollAnimationDurationMs) + " ms";
                }
            }

            function clearWaitTimer() {
                if (stepScrollWaitTimerId === 0) {
                    return;
                }

                window.clearTimeout(stepScrollWaitTimerId);
                stepScrollWaitTimerId = 0;
            }

            function clearManualResumeTimer() {
                if (manualResumeTimerId === 0) {
                    return;
                }

                window.clearTimeout(manualResumeTimerId);
                manualResumeTimerId = 0;
            }

            function cancelScrollFrame() {
                if (stepScrollFrameId === 0) {
                    return;
                }

                window.cancelAnimationFrame(stepScrollFrameId);
                stepScrollFrameId = 0;
                stepScrollAnimationStartTime = 0;
            }

            function clearProgrammaticScrollFlag() {
                if (programmaticScrollReleaseTimerId !== 0) {
                    window.clearTimeout(programmaticScrollReleaseTimerId);
                    programmaticScrollReleaseTimerId = 0;
                }

                programmaticScrollActive = false;
            }

            function markProgrammaticScroll() {
                programmaticScrollActive = true;

                if (programmaticScrollReleaseTimerId !== 0) {
                    window.clearTimeout(programmaticScrollReleaseTimerId);
                }

                programmaticScrollReleaseTimerId = window.setTimeout(function () {
                    programmaticScrollActive = false;
                    programmaticScrollReleaseTimerId = 0;
                }, stepScrollConfig.programmaticScrollFlagMs);
            }

            function setPaused(isPaused, reason) {
                stepScrollPaused = isPaused;

                if (isPaused) {
                    clearWaitTimer();
                    cancelScrollFrame();
                    if (reason) {
                        setStatus(reason);
                    }
                    return;
                }

                if (reason) {
                    setStatus(reason);
                }
            }

            function scheduleNextStep(delayOverrideMs) {
                clearWaitTimer();
                cancelScrollFrame();

                if (stepScrollPaused || !stepScrollEnabled) {
                    return;
                }

                const waitMs = typeof delayOverrideMs === "number" ? delayOverrideMs : stepScrollWaitDelayMs;
                if (waitMs > 0) {
                    setStatus("Waiting " + Math.round(waitMs) + " ms before next " + Math.round(stepScrollScreenHeightPercent) + "% screen step.");
                }

                stepScrollWaitTimerId = window.setTimeout(function () {
                    stepScrollWaitTimerId = 0;
                    startScrollAnimation();
                }, waitMs);
            }

            function resumeScroll(reason) {
                clearManualResumeTimer();
                clearWaitTimer();

                if (!stepScrollEnabled) {
                    setPaused(true, "PDF scroll is disabled.");
                    return;
                }

                if (!pdfRenderCompleted) {
                    loadPdfInFrame();
                    setPaused(true, "PDF scroll will start after PDF loaded.");
                    return;
                }

                setPaused(false, reason || "PDF scroll is running.");
                scheduleNextStep(0);
            }

            function scheduleManualResume(reason) {
                clearManualResumeTimer();
                if (!stepScrollEnabled) {
                    setPaused(true, "PDF scroll is disabled.");
                    return;
                }

                setStatus(reason || ("PDF scroll will resume in " + stepScrollConfig.manualResumeDelayMs + " ms."));
                manualResumeTimerId = window.setTimeout(function () {
                    resumeScroll("PDF scroll resumed after manual idle.");
                }, stepScrollConfig.manualResumeDelayMs);
            }

            function startScrollAnimation() {
                if (stepScrollPaused || !stepScrollEnabled) {
                    return;
                }

                const scrollElement = getScrollElement();
                const maxScrollTop = getMaxScrollTop(scrollElement);
                const directionMultiplier = stepScrollDirectionDown ? 1 : -1;
                stepScrollStartTop = scrollElement.scrollTop;
                stepScrollTargetTop = clamp(stepScrollStartTop + (getStepPixels() * directionMultiplier), 0, maxScrollTop);

                if (Math.abs(stepScrollTargetTop - stepScrollStartTop) <= 0.5) {
                    setPaused(
                        true,
                        stepScrollDirectionDown
                            ? "PDF scroll reached the end of the display."
                            : "PDF scroll reached the top of the display."
                    );
                    return;
                }

                stepScrollAnimationStartTime = 0;
                setStatus("Scrolling " + Math.round(stepScrollScreenHeightPercent) + "% of the screen, then waiting " + Math.round(stepScrollWaitDelayMs) + " ms.");
                stepScrollFrameId = window.requestAnimationFrame(animateScroll);
            }

            function animateScroll(timestamp) {
                if (stepScrollPaused || !stepScrollEnabled) {
                    cancelScrollFrame();
                    return;
                }

                if (stepScrollAnimationStartTime === 0) {
                    stepScrollAnimationStartTime = timestamp;
                }

                const scrollElement = getScrollElement();
                const elapsedMs = timestamp - stepScrollAnimationStartTime;
                const progress = clamp(elapsedMs / stepScrollAnimationDurationMs, 0, 1);
                const easedProgress = progress < 0.5
                    ? 2 * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                const nextScrollTop = stepScrollStartTop + ((stepScrollTargetTop - stepScrollStartTop) * easedProgress);

                markProgrammaticScroll();
                scrollElement.scrollTop = nextScrollTop;

                if (progress < 1) {
                    stepScrollFrameId = window.requestAnimationFrame(animateScroll);
                    return;
                }

                stepScrollFrameId = 0;
                scrollElement.scrollTop = stepScrollTargetTop;
                scheduleNextStep(stepScrollWaitDelayMs);
            }

            if (autoScrollToggleButton) {
                autoScrollToggleButton.addEventListener("click", function () {
                    loadPdfInFrame();
                    setPanelVisible(autoScrollPanel.hidden);
                });
            }

            if (autoScrollEnabledCheckbox) {
                autoScrollEnabledCheckbox.addEventListener("change", function () {
                    stepScrollEnabled = autoScrollEnabledCheckbox.checked;
                    updateUi();

                    if (!stepScrollEnabled) {
                        setPaused(true, "PDF scroll disabled from controls.");
                        return;
                    }

                    resumeScroll("PDF scroll enabled.");
                });
            }

            if (pdfFullScreenCheckbox) {
                pdfFullScreenCheckbox.addEventListener("change", function () {
                    fullScreenEnabled = pdfFullScreenCheckbox.checked;
                    updateUi();

                    if (fullScreenEnabled) {
                        requestFullScreen("Full screen enabled.");
                        return;
                    }

                    closeFullScreenIfNeeded();
                });
            }

            if (autoScrollDirectionCheckbox) {
                autoScrollDirectionCheckbox.addEventListener("change", function () {
                    stepScrollDirectionDown = autoScrollDirectionCheckbox.checked;
                    updateUi();
                    resumeScroll("Direction updated. PDF scroll restarted.");
                });
            }

            if (autoScrollStepHeightRange) {
                autoScrollStepHeightRange.addEventListener("input", function () {
                    stepScrollScreenHeightPercent = normalizeNumber(
                        Number(autoScrollStepHeightRange.value),
                        stepScrollConfig.minScreenHeightPercent,
                        stepScrollConfig.maxScreenHeightPercent,
                        stepScrollConfig.screenHeightPercent
                    );
                    updateUi();
                    setStatus("Step height updated to " + Math.round(stepScrollScreenHeightPercent) + "% of screen.");
                });
            }

            if (autoScrollWaitDelayRange) {
                autoScrollWaitDelayRange.addEventListener("input", function () {
                    stepScrollWaitDelayMs = normalizeNumber(
                        Number(autoScrollWaitDelayRange.value),
                        stepScrollConfig.minWaitDelayMs,
                        stepScrollConfig.maxWaitDelayMs,
                        stepScrollConfig.waitDelayMs
                    );
                    updateUi();
                    setStatus("Wait delay updated to " + Math.round(stepScrollWaitDelayMs) + " ms.");
                });
            }

            if (autoScrollAnimationDurationRange) {
                autoScrollAnimationDurationRange.addEventListener("input", function () {
                    stepScrollAnimationDurationMs = normalizeNumber(
                        Number(autoScrollAnimationDurationRange.value),
                        stepScrollConfig.minAnimationDurationMs,
                        stepScrollConfig.maxAnimationDurationMs,
                        stepScrollConfig.animationDurationMs
                    );
                    updateUi();
                    setStatus("Scroll duration updated to " + Math.round(stepScrollAnimationDurationMs) + " ms.");
                });
            }

            pdfScrollContainer.addEventListener("scroll", function () {
                if (programmaticScrollActive) {
                    return;
                }

                setPaused(true, "PDF scroll paused after manual scroll.");
                scheduleManualResume("PDF scroll will resume after manual scroll idle delay.");
            }, { passive: true });

            document.addEventListener("fullscreenchange", updateUi);
            document.addEventListener("webkitfullscreenchange", updateUi);
            document.addEventListener("click", requestPendingFullScreen);
            document.addEventListener("touchend", requestPendingFullScreen, { passive: true });

            setPanelVisible(stepScrollConfig.showControlPanelByDefault);
            updateUi();
            clearProgrammaticScrollFlag();
            loadPdfInFrame();

            window.addEventListener("load", function () {
                loadPdfInFrame();
                requestFullScreen("Full screen opened on page load.");

                if (stepScrollConfig.startOnLoad && stepScrollEnabled) {
                    setStatus("PDF scroll will start after PDF loaded.");
                    return;
                }

                setStatus("PDF scroll is ready.");
            });
        })();
    </script>
</body>
</html>
