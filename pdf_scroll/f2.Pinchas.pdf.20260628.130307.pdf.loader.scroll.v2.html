<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Auto-scroll PDF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111418;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;padding:0 0 20px 0}
.scroll-wrapper{width:100%;max-width:500px;margin:0 auto;position:relative;border-radius:28px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,0.7);background:#1e1e1e;max-height:80vh;overflow-y:auto;scroll-behavior:auto}
.pdf-container{width:100%;background:#1a1a1a;display:flex;flex-direction:column;align-items:center}
.pdf-container embed{display:block;width:100%;height:auto;aspect-ratio:1/1.4;min-height:500px;background:#252525;border:none}
.pdf-fallback{display:none;padding:32px 20px;background:#1e293b;color:#e2e8f0;text-align:center;width:100%}
.pdf-container.error embed{display:none}
.pdf-container.error .pdf-fallback{display:block}
.controls{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px;margin:24px 16px 8px;padding:12px 20px;background:#23272b;backdrop-filter:blur(4px);border-radius:60px;width:fit-content;max-width:92%;margin-left:auto;margin-right:auto;box-shadow:0 4px 16px rgba(0,0,0,0.6)}
.controls button{background:#2b6ef0;border:none;color:#fff;font-weight:600;font-size:.95rem;padding:10px 22px;border-radius:40px;box-shadow:0 2px 10px rgba(43,110,240,0.3);cursor:pointer;transition:0.15s ease;touch-action:manipulation;min-width:90px;letter-spacing:.3px}
.controls button:active{transform:scale(.94);background:#1a5adf}
.controls button.secondary{background:#4a5568;box-shadow:0 2px 8px rgba(74,85,104,0.3)}
.controls button.secondary:active{background:#3a4556}
.status{color:#d1d5db;font-size:.9rem;padding:6px 16px;background:#1e293b;border-radius:40px;display:inline-block;font-variant-numeric:tabular-nums;cursor:pointer;user-select:none;border:1px solid #3d4a5c;transition:.1s}
.status:active{background:#2d3b4f}
.info-note{margin-top:14px;color:#94a3b8;font-size:.75rem;text-align:center;padding:0 20px;max-width:400px;line-height:1.4}
.scroll-indicator{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);color:#f0f4ff;padding:5px 14px;border-radius:40px;font-size:.7rem;letter-spacing:.4px;pointer-events:none;border:1px solid rgba(255,255,255,0.12);opacity:.8;display:flex;align-items:center;gap:6px;font-weight:500;transition:opacity .2s}
.scroll-indicator::before{content:"⏵";font-size:.8rem;opacity:.7}
@media(max-width:480px){.controls button{min-width:70px;padding:8px 14px;font-size:.85rem}.pdf-container embed{min-height:400px}.scroll-wrapper{max-height:70vh}}
</style>
</head>
<body>

<div class="scroll-wrapper" id="scrollWrapper">
<div class="pdf-container" id="pdfContainer">
<embed id="pdfEmbed" type="application/pdf" src="">
<div class="pdf-fallback" id="pdfFallback">
<p>⚠️ PDF cannot be displayed inline.<br>
<span style="font-size:.9rem;color:#b0c4de;">
<a href="#" id="fallbackLink" target="_blank" style="color:#7aa9ff;">Open PDF in new tab</a></span></p>
</div>
</div>
<div class="scroll-indicator" id="scrollIndicator">0%</div>
</div>

<div class="controls">
<button id="toggleScrollBtn" class="secondary">⏸ Pause</button>
<button id="resetScrollBtn">⟳ Reset</button>
<span class="status" id="speedStatus">1×</span>
</div>

<div class="info-note">
PDF auto‑scrolls from top to bottom.<br>
Tap <strong>Pause</strong> to stop, <strong>Reset</strong> to start from top.
</div>

<script>
(function() {
    "use strict";

    // 📄 SET YOUR PDF URL HERE
    const PDF_URL = "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
    // Replace with your own PDF URL

    // DOM refs
    const wrapper = document.getElementById('scrollWrapper');
    const embed = document.getElementById('pdfEmbed');
    const container = document.getElementById('pdfContainer');
    const fallbackLink = document.getElementById('fallbackLink');
    const toggleBtn = document.getElementById('toggleScrollBtn');
    const resetBtn = document.getElementById('resetScrollBtn');
    const speedStatus = document.getElementById('speedStatus');
    const indicator = document.getElementById('scrollIndicator');

    // State
    let isScrolling = false;
    let isPaused = false;
    let scrollSpeed = 1;
    let animationFrame = null;
    let lastTimestamp = 0;
    let isLoaded = false;
    let startAttempts = 0;

    // Settings
    const BASE_SPEED = 1.3;
    const SPEED_OPTIONS = [0.5, 1, 1.8, 2.8];

    // ----- Force PDF display using iframe fallback -----
    function loadPDF(url) {
        if (!url || url.trim() === '') {
            container.classList.add('error');
            fallbackLink.textContent = 'No PDF URL specified';
            return;
        }

        // Try embed first
        embed.src = url;
        fallbackLink.href = url;
        container.classList.remove('error');

        // If embed fails, show fallback
        embed.onerror = function() {
            container.classList.add('error');
            console.warn('PDF embed failed. Showing fallback.');
        };

        // When embed loads successfully
        embed.onload = function() {
            container.classList.remove('error');
            isLoaded = true;
            // Start scrolling after a short delay
            setTimeout(() => {
                if (!isPaused && wrapper.scrollHeight > wrapper.clientHeight) {
                    wrapper.scrollTop = 0;
                    startScroll();
                }
            }, 800);
        };

        // Backup: if onload doesn't fire, try to detect content
        let checkInterval = setInterval(() => {
            if (wrapper.scrollHeight > wrapper.clientHeight + 50) {
                clearInterval(checkInterval);
                isLoaded = true;
                if (!isPaused) {
                    wrapper.scrollTop = 0;
                    startScroll();
                }
            }
        }, 300);

        // Fallback: force start after 3 seconds even if detection fails
        setTimeout(() => {
            clearInterval(checkInterval);
            if (!isLoaded && !isPaused) {
                // Try reloading
                embed.src = url;
                setTimeout(() => {
                    if (wrapper.scrollHeight > wrapper.clientHeight) {
                        isLoaded = true;
                        wrapper.scrollTop = 0;
                        startScroll();
                    } else {
                        // If still not loaded, show fallback
                        container.classList.add('error');
                    }
                }, 1000);
            }
        }, 3500);
    }

    // ----- Scroll engine -----
    function startScroll() {
        if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
        }

        if (isPaused) {
            isScrolling = false;
            toggleBtn.textContent = '▶ Play';
            toggleBtn.classList.remove('secondary');
            indicator.innerHTML = '⏸ PAUSED';
            indicator.style.opacity = '0.4';
            return;
        }

        // Check if at bottom
        const maxScroll = wrapper.scrollHeight - wrapper.clientHeight;
        if (wrapper.scrollTop >= maxScroll - 2 && maxScroll > 0) {
            wrapper.scrollTop = 0;
        }

        isScrolling = true;
        toggleBtn.textContent = '⏸ Pause';
        toggleBtn.classList.add('secondary');
        indicator.style.opacity = '0.8';
        lastTimestamp = performance.now();
        animationFrame = requestAnimationFrame(scrollStep);
    }

    function scrollStep(timestamp) {
        if (!isScrolling) {
            animationFrame = requestAnimationFrame(scrollStep);
            return;
        }

        if (!wrapper) {
            animationFrame = requestAnimationFrame(scrollStep);
            return;
        }

        const maxScroll = wrapper.scrollHeight - wrapper.clientHeight;
        if (maxScroll <= 0) {
            animationFrame = requestAnimationFrame(scrollStep);
            return;
        }

        const currentScroll = wrapper.scrollTop;

        // Stop at bottom
        if (currentScroll >= maxScroll - 1) {
            isScrolling = false;
            toggleBtn.textContent = '▶ Play';
            toggleBtn.classList.remove('secondary');
            indicator.innerHTML = '⏸ END';
            indicator.style.opacity = '0.4';
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            return;
        }

        const now = performance.now();
        const deltaMs = Math.min(now - lastTimestamp, 50);
        lastTimestamp = now;

        const speedFactor = BASE_SPEED * scrollSpeed;
        let scrollDelta = speedFactor * deltaMs;

        let newScroll = currentScroll + scrollDelta;
        if (newScroll > maxScroll) newScroll = maxScroll;
        wrapper.scrollTop = newScroll;

        // Update indicator
        const percent = maxScroll > 0 ? Math.min(100, (newScroll / maxScroll) * 100) : 0;
        indicator.textContent = Math.round(percent) + '%';
        indicator.style.opacity = '0.8';

        animationFrame = requestAnimationFrame(scrollStep);
    }

    // ----- Toggle pause/play -----
    function toggleScroll() {
        if (isScrolling) {
            // Pause
            isScrolling = false;
            isPaused = true;
            toggleBtn.textContent = '▶ Play';
            toggleBtn.classList.remove('secondary');
            indicator.innerHTML = '⏸ PAUSED';
            indicator.style.opacity = '0.4';
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
        } else {
            // Play
            isPaused = false;
            const maxScroll = wrapper.scrollHeight - wrapper.clientHeight;
            if (wrapper.scrollTop >= maxScroll - 2 && maxScroll > 0) {
                wrapper.scrollTop = 0;
            }
            startScroll();
        }
    }

    // ----- Reset -----
    function resetScroll() {
        wrapper.scrollTop = 0;
        isPaused = false;
        if (isScrolling) {
            // Just update indicator
            indicator.textContent = '0%';
            return;
        }
        startScroll();
    }

    // ----- Speed cycle -----
    function cycleSpeed() {
        let idx = SPEED_OPTIONS.indexOf(scrollSpeed);
        idx = (idx + 1) % SPEED_OPTIONS.length;
        scrollSpeed = SPEED_OPTIONS[idx];
        speedStatus.textContent = scrollSpeed + '×';
    }

    // ----- Force display with iframe if embed fails -----
    function forceDisplayWithIframe() {
        // If after 5 seconds the PDF still isn't showing, try iframe
        setTimeout(() => {
            if (!isLoaded && !container.classList.contains('error')) {
                const iframe = document.createElement('iframe');
                iframe.src = PDF_URL;
                iframe.style.width = '100%';
                iframe.style.height = '600px';
                iframe.style.border = 'none';
                iframe.style.background = '#252525';
                
                const container = document.getElementById('pdfContainer');
                const embedEl = document.getElementById('pdfEmbed');
                embedEl.style.display = 'none';
                container.appendChild(iframe);
                
                isLoaded = true;
                setTimeout(() => {
                    if (!isPaused) {
                        wrapper.scrollTop = 0;
                        startScroll();
                    }
                }, 500);
            }
        }, 4000);
    }

    // ----- Init -----
    function init() {
        // Set up wrapper
        wrapper.style.maxHeight = '80vh';
        wrapper.style.overflowY = 'auto';
        wrapper.style.scrollBehavior = 'auto';
        wrapper.style.position = 'relative';

        // Load PDF
        loadPDF(PDF_URL);
        
        // Force iframe fallback if needed
        forceDisplayWithIframe();

        // Set initial speed
        speedStatus.textContent = '1×';

        // Event listeners
        toggleBtn.addEventListener('click', toggleScroll);
        resetBtn.addEventListener('click', resetScroll);
        speedStatus.addEventListener('click', cycleSpeed);

        // Handle visibility change
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isScrolling) {
                isScrolling = false;
                isPaused = true;
                toggleBtn.textContent = '▶ Play';
                toggleBtn.classList.remove('secondary');
                indicator.innerHTML = '⏸ PAUSED';
                indicator.style.opacity = '0.4';
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
            }
        });
    }

    // Start
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();
</script>
</body>
</html>
