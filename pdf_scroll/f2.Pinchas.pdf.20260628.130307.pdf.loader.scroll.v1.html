<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Auto-scroll PDF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:system-ui;padding:0 0 20px 0}
.scroll-wrapper{width:100%;max-width:500px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,0.7);background:#1e1e1e;max-height:80vh;overflow-y:auto}
.pdf-container{width:100%;background:#1a1a1a}
.pdf-container embed{display:block;width:100%;height:auto;aspect-ratio:1/1.4;min-height:500px;background:#252525;border:none}
.pdf-fallback{display:none;padding:32px 20px;background:#1e293b;color:#e2e8f0;text-align:center}
.pdf-container.error embed{display:none}
.pdf-container.error .pdf-fallback{display:block}
.controls{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px;margin:24px 16px 8px;padding:12px 20px;background:#23272b;border-radius:60px;width:fit-content;max-width:92%;margin-left:auto;margin-right:auto}
.controls button{background:#2b6ef0;border:none;color:#fff;font-weight:600;font-size:.95rem;padding:10px 22px;border-radius:40px;cursor:pointer;min-width:90px}
.controls button:active{transform:scale(.94)}
.controls button.secondary{background:#4a5568}
.status{color:#d1d5db;font-size:.9rem;padding:6px 16px;background:#1e293b;border-radius:40px;cursor:pointer;border:1px solid #3d4a5c}
.scroll-indicator{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,0.7);color:#f0f4ff;padding:5px 14px;border-radius:40px;font-size:.7rem;border:1px solid rgba(255,255,255,0.12)}
</style>
</head>
<body>
<div class="scroll-wrapper" id="scrollWrapper">
<div class="pdf-container" id="pdfContainer">
<embed id="pdfEmbed" type="application/pdf" src="">
<div class="pdf-fallback"><p>⚠️ PDF cannot be displayed.<br><a href="#" id="fallbackLink" target="_blank" style="color:#7aa9ff;">Open in new tab</a></p></div>
</div>
<div class="scroll-indicator" id="scrollIndicator">0%</div>
</div>
<div class="controls">
<button id="toggleScrollBtn" class="secondary">⏸ Pause</button>
<button id="resetScrollBtn">⟳ Reset</button>
<span class="status" id="speedStatus">1×</span>
</div>
<script>
const PDF_URL="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
const wrapper=document.getElementById('scrollWrapper');
const embed=document.getElementById('pdfEmbed');
const container=document.getElementById('pdfContainer');
const toggleBtn=document.getElementById('toggleScrollBtn');
const resetBtn=document.getElementById('resetScrollBtn');
const speedStatus=document.getElementById('speedStatus');
const indicator=document.getElementById('scrollIndicator');
let isScrolling=false,paused=false,speed=1,frame=null,last=0;
const BASE=1.3,SPEEDS=[0.5,1,1.8,2.8];

function loadPdf(url){embed.src=url;document.getElementById('fallbackLink').href=url;container.classList.remove('error');embed.onerror=()=>container.classList.add('error');embed.onload=()=>{container.classList.remove('error');setTimeout(()=>{if(!paused){wrapper.scrollTop=0;startScroll()}},500)};setTimeout(()=>{if(!isScrolling&&!paused&&wrapper.scrollHeight>wrapper.clientHeight){wrapper.scrollTop=0;startScroll()}},2000)}

function startScroll(){if(frame)cancelAnimationFrame(frame);if(paused){isScrolling=false;toggleBtn.textContent='▶ Play';toggleBtn.classList.remove('secondary');indicator.innerHTML='⏸ PAUSED';return}isScrolling=true;toggleBtn.textContent='⏸ Pause';toggleBtn.classList.add('secondary');last=performance.now();frame=requestAnimationFrame(step)}

function step(t){if(!isScrolling){frame=requestAnimationFrame(step);return}const max=wrapper.scrollHeight-wrapper.clientHeight;if(max<=0){frame=requestAnimationFrame(step);return}const cur=wrapper.scrollTop;if(cur>=max-1){isScrolling=false;toggleBtn.textContent='▶ Play';toggleBtn.classList.remove('secondary');indicator.innerHTML='⏸ END';if(frame)cancelAnimationFrame(frame);return}const now=performance.now();const delta=Math.min(now-last,50);last=now;let newScroll=cur+BASE*speed*delta;if(newScroll>max)newScroll=max;wrapper.scrollTop=newScroll;const pct=max>0?Math.round((newScroll/max)*100):0;indicator.textContent=pct+'%';frame=requestAnimationFrame(step)}

function toggle(){if(isScrolling){isScrolling=false;paused=true;toggleBtn.textContent='▶ Play';toggleBtn.classList.remove('secondary');indicator.innerHTML='⏸ PAUSED';if(frame)cancelAnimationFrame(frame)}else{paused=false;if(wrapper){const max=wrapper.scrollHeight-wrapper.clientHeight;if(wrapper.scrollTop>=max-2&&max>0)wrapper.scrollTop=0}startScroll()}}

function reset(){wrapper.scrollTop=0;paused=false;if(isScrolling){indicator.textContent='0%';return}startScroll()}
function cycleSpeed(){let i=SPEEDS.indexOf(speed);i=(i+1)%SPEEDS.length;speed=SPEEDS[i];speedStatus.textContent=speed+'×'}

toggleBtn.onclick=toggle;resetBtn.onclick=reset;speedStatus.onclick=cycleSpeed;
speedStatus.textContent='1×';loadPdf(PDF_URL);
</script>
</body>
</html>
